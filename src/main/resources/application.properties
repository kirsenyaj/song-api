spring.application.name=song
# Database Connection URL (Change 'your_database_name' to your actual DB name)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_song

# Database Credentials
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/your_local_db_name}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect