spring.application.name=song
# Database Connection URL (Change 'your_database_name' to your actual DB name)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_song

# Database Credentials
spring.datasource.username=postgres
spring.datasource.password=admin

# Hibernate properties to automatically create/update your tables based on your Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect